<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cognix — Entrar</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet"/>
</head>
<body class="home-page">
  <div class="stars"></div>
  <div class="particles" id="particles"></div>

  <div class="container home-container">
    <div class="logo-area">
      <div class="logo-icon">🧠</div>
      <h1 class="logo-title">Cog<span>nix</span></h1>
      <p class="logo-sub">Aprenda. Evolua. Domine.</p>
    </div>

    <div class="card" style="width:100%;max-width:420px;">
      <div class="card-inner" style="padding:2rem;text-align:center;">
        <h2 style="font-family:var(--font-head);color:white;letter-spacing:3px;font-size:1.1rem;margin-bottom:0.5rem;">ÁREA DO ALUNO</h2>
        <p style="color:var(--text2);font-size:0.9rem;margin-bottom:2rem;line-height:1.6;">Entre com sua conta Google para salvar seu progresso, XP e histórico de partidas.</p>

        <button id="btnGoogle" class="btn-google">
          <svg width="20" height="20" viewBox="0 0 48 48" style="flex-shrink:0;">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            <path fill="none" d="M0 0h48v48H0z"/>
          </svg>
          <span>Entrar com Google</span>
        </button>

        <div id="msgLogin" class="msg hidden" style="margin-top:1rem;"></div>

        <div style="margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--border);">
          <p style="color:var(--text2);font-size:0.8rem;">É professor?</p>
          <a href="https://equaresma07.github.io/EduQuest-Admin/"
            style="color:var(--cyan);font-size:0.85rem;text-decoration:none;letter-spacing:1px;font-family:var(--font-head);">
            🎓 Acessar Painel do Professor
          </a>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth, provider, db, doc, getDoc, signInWithPopup, onAuthStateChanged } from './js/firebase.js';

    // Partículas
    const pc = document.getElementById('particles');
    for (let i=0;i<30;i++){
      const p=document.createElement('div'); p.className='particle';
      p.style.left=Math.random()*100+'%';
      p.style.animationDelay=Math.random()*8+'s';
      p.style.animationDuration=(6+Math.random()*6)+'s';
      p.style.width=p.style.height=(4+Math.random()*8)+'px';
      pc.appendChild(p);
    }

    // Se já está logado com perfil, vai direto para index
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const snap = await getDoc(doc(db, 'alunos', user.uid));
        if (snap.exists()) {
          location.href = 'index.html';
        } else {
          location.href = 'cadastro.html';
        }
      }
    });

    document.getElementById('btnGoogle').onclick = async () => {
      const btn = document.getElementById('btnGoogle');
      const msg = document.getElementById('msgLogin');
      btn.disabled = true;
      btn.querySelector('span').textContent = 'Entrando...';
      try {
        await signInWithPopup(auth, provider);
        // onAuthStateChanged vai redirecionar
      } catch(e) {
        msg.textContent = '❌ Erro ao entrar: ' + e.message;
        msg.className = 'msg msg-erro';
        btn.disabled = false;
        btn.querySelector('span').textContent = 'Entrar com Google';
      }
    };
  </script>
</body>
</html>
