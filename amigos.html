<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cognix — Amigos</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet"/>
</head>
<body class="ranking-page">
  <div class="stars"></div>

  <div class="container ranking-container">

    <div style="display:flex;align-items:center;justify-content:space-between;width:100%;max-width:520px;margin-bottom:1rem;">
      <h2 style="font-family:var(--font-head);color:white;letter-spacing:3px;font-size:1.1rem;margin:0;">👥 AMIGOS</h2>
      <button class="btn-home" onclick="location.href='index.html'" style="padding:0.4rem 1rem;font-size:0.8rem;">🏠 Início</button>
    </div>

    <!-- ABAS -->
    <div class="batalha-tabs" style="width:100%;max-width:520px;">
      <button class="tab-btn active" data-tab="amigos">👥 Amigos</button>
      <button class="tab-btn" data-tab="solicitacoes">📬 Solicitações <span id="badgeSol" class="notif-badge hidden">0</span></button>
    </div>

    <!-- ABA: AMIGOS -->
    <div id="tabAmigos" class="tab-content card" style="width:100%;max-width:520px;">
      <div class="card-inner" style="padding:1.5rem;">

        <!-- BUSCA DE NOVOS AMIGOS — sempre visível no topo -->
        <div style="margin-bottom:1.25rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border);">
          <div style="font-family:var(--font-head);color:var(--cyan);font-size:0.78rem;letter-spacing:2px;margin-bottom:0.6rem;">➕ ADICIONAR NOVOS AMIGOS</div>
          <div style="display:flex;gap:0.6rem;">
            <input type="text" id="inputBusca" placeholder="Buscar por apelido..." maxlength="20" style="flex:1;"/>
            <button class="btn-play" id="btnBuscar" style="width:auto;padding:0 1rem;margin-top:0;white-space:nowrap;">
              <span>🔍</span>
            </button>
          </div>
          <div id="resultadoBusca" style="margin-top:0.75rem;"></div>
        </div>

        <div id="loadingAmigos" class="loading-ranking">🔄 Carregando...</div>
        <div id="listaAmigos"></div>
      </div>
    </div>

    <!-- ABA: SOLICITAÇÕES -->
    <div id="tabSolicitacoes" class="tab-content card" style="width:100%;max-width:520px;display:none;">
      <div class="card-inner" style="padding:1.5rem;">
        <div id="loadingSol" class="loading-ranking">🔄 Carregando...</div>
        <div id="listaSolicitacoes"></div>
      </div>
    </div>



  </div>

  <script type="module">
    import { db, auth, doc, getDoc, getDocs, setDoc, deleteDoc, collection, query, where, onSnapshot, onAuthStateChanged, serverTimestamp } from './js/firebase.js';
    import { iniciarNotificacoes } from './js/notificacoes.js';
    import { calcularNivel, renderAvatar } from './js/perfil.js';

    let eu = null, meuPerfil = null;

    // ===== AUTH =====
    onAuthStateChanged(auth, async (user) => {
      if (!user) { location.href = 'login.html'; return; }
      const snap = await getDoc(doc(db, 'alunos', user.uid));
      if (!snap.exists()) { location.href = 'cadastro.html'; return; }
      eu = user; meuPerfil = snap.data();
      carregarAmigos();
      escutarSolicitacoes();
    });

    // ===== ABAS (apenas Amigos e Solicitações) =====
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        btn.classList.add('active');
        const tabId = 'tab' + btn.dataset.tab.charAt(0).toUpperCase() + btn.dataset.tab.slice(1);
        const el = document.getElementById(tabId);
        if (el) el.style.display = 'block';
        if (btn.dataset.tab === 'solicitacoes') carregarSolicitacoes();
        if (btn.dataset.tab === 'amigos') carregarAmigos();
      };
    });

    // ===== AMIGOS =====
    async function carregarAmigos() {
      const lista   = document.getElementById('listaAmigos');
      const loading = document.getElementById('loadingAmigos');
      loading.style.display = 'block'; lista.innerHTML = '';
      try {
        const snap = await getDocs(collection(db, 'alunos', eu.uid, 'amigos'));
        loading.style.display = 'none';
        const amigos = [];
        snap.forEach(d => { if (d.data().status === 'aceito') amigos.push({ id: d.id, ...d.data() }); });
        if (!amigos.length) {
          lista.innerHTML = '<div class="no-ranking">Você ainda não tem amigos.<br>Use a aba Buscar para encontrar jogadores! 🔍</div>';
          return;
        }
        for (const a of amigos) {
          const perfSnap = await getDoc(doc(db, 'alunos', a.amigoUid));
          if (!perfSnap.exists()) continue;
          const p  = perfSnap.data();
          const nv = calcularNivel(p.xp || 0);
          const div = document.createElement('div');
          div.className = 'ranking-item';
          div.innerHTML = `
            <div style="display:flex;align-items:center;gap:0.75rem;flex:1;">
              <div style="width:44px;height:44px;border-radius:50%;overflow:hidden;background:rgba(0,200,255,0.1);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                ${renderAvatar(p.avatar, p.avatarTipo)}
              </div>
              <div>
                <div class="rank-name">${p.apelido}</div>
                <div class="rank-details">${nv.emoji} ${nv.nome} · Nível ${nv.nivel} · ${p.xp||0} XP</div>
              </div>
            </div>
            <div style="display:flex;gap:0.5rem;">
              <button class="btn-desafiar" data-uid="${p.uid}" data-apelido="${p.apelido}"
                style="background:rgba(255,68,85,0.1);border:1px solid rgba(255,68,85,0.3);border-radius:8px;padding:0.3rem 0.75rem;color:var(--red);font-family:var(--font-body);font-size:0.82rem;cursor:pointer;white-space:nowrap;">
                ⚔️ Desafiar</button>
              <button class="btn-remover" data-uid="${a.amigoUid}"
                style="background:none;border:1px solid var(--border);border-radius:8px;padding:0.3rem 0.6rem;color:var(--text2);font-family:var(--font-body);font-size:0.82rem;cursor:pointer;">
                🗑️</button>
            </div>`;
          div.querySelector('.btn-desafiar').onclick = function() { irParaDesafio(this.dataset.uid, this.dataset.apelido); };
          div.querySelector('.btn-remover').onclick  = async function() {
            if (!confirm('Remover este amigo?')) return;
            await deleteDoc(doc(db, 'alunos', eu.uid, 'amigos', this.dataset.uid));
            await deleteDoc(doc(db, 'alunos', this.dataset.uid, 'amigos', eu.uid));
            div.remove();
          };
          lista.appendChild(div);
        }
      } catch(e) { loading.style.display='none'; lista.innerHTML='<div class="no-ranking">❌ '+e.message+'</div>'; }
    }

    // ===== SOLICITAÇÕES (escuta em tempo real) =====
    function escutarSolicitacoes() {
      onSnapshot(collection(db, 'alunos', eu.uid, 'amigos'), snap => {
        let pendentes = 0;
        snap.forEach(d => { if (d.data().status === 'pendente' && d.data().solicitanteUid !== eu.uid) pendentes++; });
        const badge = document.getElementById('badgeSol');
        if (pendentes > 0) { badge.textContent = pendentes; badge.classList.remove('hidden'); }
        else badge.classList.add('hidden');
      });
    }

    async function carregarSolicitacoes() {
      const lista   = document.getElementById('listaSolicitacoes');
      const loading = document.getElementById('loadingSol');
      loading.style.display = 'block'; lista.innerHTML = '';
      try {
        const snap = await getDocs(collection(db, 'alunos', eu.uid, 'amigos'));
        loading.style.display = 'none';
        const pendentes = [];
        snap.forEach(d => { const data = d.data(); if (data.status === 'pendente' && data.solicitanteUid !== eu.uid) pendentes.push({ id: d.id, ...data }); });
        if (!pendentes.length) { lista.innerHTML = '<div class="no-ranking">Nenhuma solicitação pendente. ✅</div>'; return; }
        for (const s of pendentes) {
          const perfSnap = await getDoc(doc(db, 'alunos', s.solicitanteUid));
          if (!perfSnap.exists()) continue;
          const p = perfSnap.data();
          const nv = calcularNivel(p.xp || 0);
          const div = document.createElement('div');
          div.className = 'ranking-item';
          div.innerHTML = `
            <div style="display:flex;align-items:center;gap:0.75rem;flex:1;">
              <div style="width:44px;height:44px;border-radius:50%;overflow:hidden;background:rgba(0,200,255,0.1);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                ${renderAvatar(p.avatar, p.avatarTipo)}
              </div>
              <div>
                <div class="rank-name">${p.apelido} quer ser seu amigo</div>
                <div class="rank-details">${nv.emoji} ${nv.nome} · Nível ${nv.nivel}</div>
              </div>
            </div>
            <div style="display:flex;gap:0.5rem;">
              <button class="btn-aceitar" data-uid="${s.solicitanteUid}"
                style="background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.3);border-radius:8px;padding:0.3rem 0.75rem;color:var(--green);font-size:0.82rem;cursor:pointer;">
                ✅ Aceitar</button>
              <button class="btn-recusar" data-uid="${s.solicitanteUid}"
                style="background:rgba(255,68,85,0.1);border:1px solid rgba(255,68,85,0.3);border-radius:8px;padding:0.3rem 0.75rem;color:var(--red);font-size:0.82rem;cursor:pointer;">
                ❌ Recusar</button>
            </div>`;
          div.querySelector('.btn-aceitar').onclick = async function() {
            const uid = this.dataset.uid;
            await setDoc(doc(db,'alunos',eu.uid,'amigos',uid),    { amigoUid:uid,       solicitanteUid:uid, status:'aceito', criadoEm: new Date() });
            await setDoc(doc(db,'alunos',uid,'amigos',eu.uid),    { amigoUid:eu.uid,    solicitanteUid:uid, status:'aceito', criadoEm: new Date() });
            div.remove();
          };
          div.querySelector('.btn-recusar').onclick = async function() {
            await deleteDoc(doc(db,'alunos',eu.uid,'amigos',this.dataset.uid));
            await deleteDoc(doc(db,'alunos',this.dataset.uid,'amigos',eu.uid));
            div.remove();
          };
          lista.appendChild(div);
        }
      } catch(e) { loading.style.display='none'; lista.innerHTML='<div class="no-ranking">❌ '+e.message+'</div>'; }
    }

    // ===== BUSCAR =====
    document.getElementById('btnBuscar').onclick = buscarJogador;
    document.getElementById('inputBusca').addEventListener('keydown', e => { if(e.key==='Enter') buscarJogador(); });

    async function buscarJogador() {
      const apelido = document.getElementById('inputBusca').value.trim();
      const res     = document.getElementById('resultadoBusca');
      if (!apelido) return;
      res.innerHTML = '<div class="loading-ranking">🔄 Buscando...</div>';
      try {
        const snap = await getDocs(query(collection(db,'alunos'), where('apelidoLower','==',apelido.toLowerCase())));
        if (snap.empty) { res.innerHTML = '<div class="no-ranking">Nenhum jogador encontrado com esse apelido.</div>'; return; }
        const p  = snap.docs[0].data();
        if (p.uid === eu.uid) { res.innerHTML = '<div class="no-ranking">Esse é você! 😄</div>'; return; }
        const nv = calcularNivel(p.xp || 0);

        // Verifica relação atual
        const relSnap = await getDoc(doc(db,'alunos',eu.uid,'amigos',p.uid));
        let acaoBtns = '';
        if (!relSnap.exists()) {
          acaoBtns = `<button id="btnAddAmigo" style="background:rgba(0,200,255,0.1);border:1px solid rgba(0,200,255,0.3);border-radius:8px;padding:0.4rem 1rem;color:var(--cyan);font-family:var(--font-body);cursor:pointer;">➕ Adicionar Amigo</button>`;
        } else if (relSnap.data().status === 'pendente') {
          acaoBtns = `<span style="color:var(--text2);font-size:0.85rem;">⏳ Solicitação enviada</span>`;
        } else if (relSnap.data().status === 'aceito') {
          acaoBtns = `<button id="btnDesafiarBusca" data-uid="${p.uid}" data-apelido="${p.apelido}" style="background:rgba(255,68,85,0.1);border:1px solid rgba(255,68,85,0.3);border-radius:8px;padding:0.4rem 1rem;color:var(--red);font-family:var(--font-body);cursor:pointer;">⚔️ Desafiar</button>`;
        }

        res.innerHTML = `
          <div class="ranking-item" style="flex-direction:column;align-items:flex-start;gap:1rem;">
            <div style="display:flex;align-items:center;gap:1rem;width:100%;">
              <div style="width:56px;height:56px;border-radius:50%;overflow:hidden;background:rgba(0,200,255,0.1);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                ${renderAvatar(p.avatar, p.avatarTipo, 'md')}
              </div>
              <div style="flex:1;">
                <div class="rank-name" style="font-size:1rem;">${p.apelido}</div>
                <div class="rank-details">${nv.emoji} ${nv.nome} · Nível ${nv.nivel} · ${p.xp||0} XP</div>
                ${p.cidade && p.estado ? `<div class="rank-details">📍 ${p.cidade}, ${p.estado}</div>` : ''}
              </div>
            </div>
            <div style="width:100%;display:flex;justify-content:flex-end;">${acaoBtns}</div>
          </div>`;

        if (document.getElementById('btnAddAmigo')) {
          document.getElementById('btnAddAmigo').onclick = async function() {
            this.textContent = '⏳ Enviando...'; this.disabled = true;
            await setDoc(doc(db,'alunos',eu.uid,'amigos',p.uid),  { amigoUid:p.uid,  solicitanteUid:eu.uid, status:'pendente', criadoEm: new Date() });
            await setDoc(doc(db,'alunos',p.uid,'amigos',eu.uid),  { amigoUid:eu.uid, solicitanteUid:eu.uid, status:'pendente', criadoEm: new Date() });
            this.textContent = '✅ Solicitação enviada'; this.disabled = true;
          };
        }
        if (document.getElementById('btnDesafiarBusca')) {
          document.getElementById('btnDesafiarBusca').onclick = function() { irParaDesafio(this.dataset.uid, this.dataset.apelido); };
        }
      } catch(e) { res.innerHTML = '<div class="no-ranking">❌ '+e.message+'</div>'; }
    }

    // ===== IR PARA DESAFIO =====
    function irParaDesafio(uid, apelido) {
      localStorage.setItem('batalha_oponente_uid',     uid);
      localStorage.setItem('batalha_oponente_apelido', apelido);
      location.href = 'batalha-lobby.html';
    }
  </script>
</body>
</html>
